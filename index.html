<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de mi Taller</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container-fluid" style="padding: 20px;">
        <h1>⚙️ Panel de Control del Taller</h1>
        <hr>
        
        <!-- Formulario más completo -->
        <section>
            <h3>Nueva Orden de Producción</h3>
            <form id="formularioOrden" onsubmit="event.preventDefault(); guardarOrden();">
                <div class="grid">
                    <label>Cliente
                        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" required>
                    </label>
                    <label>Producto a Fabricar
                        <input type="text" id="producto" placeholder="Ej: Engranaje 10mm" required>
                    </label>
                </div>
                
                <div class="grid">
                    <label>Cantidad
                        <input type="number" id="cantidad" placeholder="0" min="1" required>
                    </label>
                    <label>Fecha de Entrega
                        <input type="date" id="fecha" required>
                    </label>
                </div>
                
                <button type="submit" style="margin-top: 15px;">Crear Orden de Trabajo</button>
            </form>
        </section>

        <!-- Tabla de órdenes activas -->
        <section>
            <h3>📋 Órdenes de Trabajo Activas</h3>
            <figure>
                <table role="grid">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Entrega</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaDeOrdenes">
                        <!-- Aquí se meterán las filas automáticamente -->
                    </tbody>
                </table>
            </figure>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", mostrarOrdenes);

        function obtenerOrdenes() {
            let datosGuardados = localStorage.getItem("misOrdenesEstructuradas");
            return datosGuardados ? JSON.parse(datosGuardados) : [];
        }

        function guardarOrden() {
            // Atrapamos los 4 datos individuales
            let cliente = document.getElementById("cliente").value.trim();
            let producto = document.getElementById("producto").value.trim();
            let cantidad = document.getElementById("cantidad").value;
            let fecha = document.getElementById("fecha").value;
            
            // Creamos un "paquete" (objeto) con esos datos
            let nuevaOrden = {
                cliente: cliente,
                producto: producto,
                cantidad: cantidad,
                fecha: fecha
            };
            
            let listaActual = obtenerOrdenes();
            listaActual.push(nuevaOrden);
            
            localStorage.setItem("misOrdenesEstructuradas", JSON.stringify(listaActual));
            
            // Esto limpia todo el formulario automáticamente
            document.getElementById("formularioOrden").reset();
            mostrarOrdenes();
        }

        function mostrarOrdenes() {
            let listaActual = obtenerOrdenes();
            let tablaHTML = document.getElementById("tablaDeOrdenes");
            tablaHTML.innerHTML = ""; // Vaciamos la tabla

            if(listaActual.length === 0) {
                tablaHTML.innerHTML = `<tr><td colspan="5" style="text-align: center; color: gray;">No hay órdenes de trabajo pendientes.</td></tr>`;
                return;
            }

            listaActual.forEach((orden, indice) => {
                tablaHTML.innerHTML += `
                    <tr>
                        <td><strong>${orden.cliente}</strong></td>
                        <td>${orden.producto}</td>
                        <td><mark>${orden.cantidad} uds</mark></td>
                        <td>${orden.fecha}</td>
                        <td>
                            <button class="outline contrast" style="width: auto; margin: 0; padding: 2px 10px;" onclick="eliminarOrden(${indice})">✓ Terminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        function eliminarOrden(indice) {
            let listaActual = obtenerOrdenes();
            listaActual.splice(indice, 1);
            localStorage.setItem("misOrdenesEstructuradas", JSON.stringify(listaActual));
            mostrarOrdenes();
        }
    </script>
</body>
</html>
