<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de mi Taller</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container" style="max-width: 600px; padding-top: 20px;">
        <h1>⚙️ Panel del Taller</h1>
        <hr>
        
        <section>
            <h3>Nueva Orden de Producción</h3>
            <form id="formularioOrden" onsubmit="event.preventDefault(); guardarOrden();">
                <input type="text" id="textoOrden" placeholder="Ej: Fabricar 50 tornillos..." required>
                <button type="submit">Agregar Orden</button>
            </form>
        </section>

        <section>
            <h3>Órdenes Pendientes:</h3>
            <ul id="listaDeOrdenes" style="list-style: none; padding: 0;">
                </ul>
        </section>
    </main>

    <script>
        // Cuando la página termine de cargar, que busque y muestre las órdenes guardadas
        document.addEventListener("DOMContentLoaded", mostrarOrdenes);

        // Función para leer la memoria del navegador
        function obtenerOrdenes() {
            let datosGuardados = localStorage.getItem("misOrdenes");
            return datosGuardados ? JSON.parse(datosGuardados) : [];
        }

        // Función para guardar una nueva orden
        function guardarOrden() {
            let cajaTexto = document.getElementById("textoOrden");
            let nuevaTarea = cajaTexto.value.trim();
            
            let listaActual = obtenerOrdenes();
            listaActual.push(nuevaTarea); // Sumamos la nueva orden al grupo
            
            // Guardamos el grupo actualizado en la memoria del navegador
            localStorage.setItem("misOrdenes", JSON.stringify(listaActual));
            
            cajaTexto.value = ""; // Limpiamos el buscador
            mostrarOrdenes(); // Refrescamos la pantalla
        }

        // Función para dibujar las órdenes en la pantalla
        function mostrarOrdenes() {
            let listaActual = obtenerOrdenes();
            let listaHTML = document.getElementById("listaDeOrdenes");
            listaHTML.innerHTML = ""; // Vaciamos la lista vieja

            listaActual.forEach((orden, indice) => {
                listaHTML.innerHTML += `
                    <li style="display: flex; justify-content: space-between; align-items: center; background: #23313d; padding: 10px; margin-bottom: 8px; border-radius: 5px;">
                        <span>${orden}</span>
                        <button class="outline" style="width: auto; margin: 0; padding: 5px 10px;" onclick="eliminarOrden(${indice})">✓ Terminar</button>
                    </li>
                `;
            });
        }

        // Función para borrar una orden cuando se termina
        function eliminarOrden(indice) {
            let listaActual = obtenerOrdenes();
            listaActual.splice(indice, 1); // Quitamos la orden de la lista
            localStorage.setItem("misOrdenes", JSON.stringify(listaActual)); // Guardamos el cambio
            mostrarOrdenes(); // Refrescamos la pantalla
        }
    </script>
</body>
</html>
