<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de mi Taller</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container-fluid" style="padding: 20px;">
        <h1>⚙️ Panel de Control del Taller</h1>
        <hr>
        
        <section>
            <h3>Nueva Orden de Producción</h3>
            <form id="formularioOrden" onsubmit="event.preventDefault(); guardarOrden();">
                <div class="grid">
                    <label>Cliente
                        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" required>
                    </label>
                    <label>Producto a Fabricar
                        <input type="text" id="producto" placeholder="Ej: Engranaje 10mm" required>
                    </label>
                </div>
                
                <div class="grid">
                    <label>Cantidad
                        <input type="number" id="cantidad" placeholder="0" min="1" required>
                    </label>
                    <label>Fecha de Entrega
                        <input type="date" id="fecha" required>
                    </label>
                </div>
                
                <button type="submit" style="margin-top: 15px;">Crear Orden de Trabajo</button>
            </form>
        </section>

        <section>
            <h3>📋 Órdenes de Trabajo Activas</h3>
            <figure>
                <table role="grid">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Entrega</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaDeOrdenes">
                        </tbody>
                </table>
            </figure>
        </section>

        <section style="margin-top: 50px;">
            <h3>📦 Historial de Trabajos Entregados</h3>
            <figure>
                <table role="grid" style="background-color: #141e26;">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Fecha Pactada</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorial">
                        </tbody>
                </table>
            </figure>
        </section>

    </main>

    <script>
        // Cuando arranca la página, carga ambas tablas
        document.addEventListener("DOMContentLoaded", () => {
            mostrarOrdenes();
            mostrarHistorial();
        });

        // --- FUNCIONES PARA ÓRDENES ACTIVAS ---
        function obtenerOrdenes() {
            let datos = localStorage.getItem("misOrdenesEstructuradas");
            return datos ? JSON.parse(datos) : [];
        }

        function guardarOrden() {
            let cliente = document.getElementById("cliente").value.trim();
            let producto = document.getElementById("producto").value.trim();
            let cantidad = document.getElementById("cantidad").value;
            let fecha = document.getElementById("fecha").value;
            
            let nuevaOrden = {
                cliente: cliente,
                producto: producto,
                cantidad: cantidad,
                fecha: fecha,
                estado: "Pendiente" 
            };
            
            let listaActual = obtenerOrdenes();
            listaActual.push(nuevaOrden);
            
            localStorage.setItem("misOrdenesEstructuradas", JSON.stringify(listaActual));
            document.getElementById("formularioOrden").reset();
            mostrarOrdenes();
        }

        function mostrarOrdenes() {
            let listaActual = obtenerOrdenes();
            let tablaHTML = document.getElementById("tablaDeOrdenes");
            tablaHTML.innerHTML = ""; 

            if(listaActual.length === 0) {
                tablaHTML.innerHTML = `<tr><td colspan="6" style="text-align: center; color: gray;">No hay órdenes de trabajo pendientes.</td></tr>`;
                return;
            }

            listaActual.forEach((orden, indice) => {
                let estadoActual = orden.estado || "Pendiente";
                let etiquetaEstado = "";
                let botonAccion = "";

                if (estadoActual === "Pendiente") {
                    etiquetaEstado = `<span style="color: #b58900;">🟡 Pendiente</span>`;
                    botonAccion = `<button class="outline" style="width: auto; margin: 0; padding: 2px 10px;" onclick="cambiarEstado(${indice}, 'En proceso')">▶ Iniciar</button>`;
                } else if (estadoActual === "En proceso") {
                    etiquetaEstado = `<span style="color: #268bd2; font-weight: bold;">🔵 En proceso</span>`;
                    // IMPORTANTE: Ahora este botón llama a 'terminarOrden' en vez de borrar
                    botonAccion = `<button class="outline contrast" style="width: auto; margin: 0; padding: 2px 10px;" onclick="terminarOrden(${indice})">✓ Terminar</button>`;
                }

                tablaHTML.innerHTML += `
                    <tr>
                        <td><strong>${orden.cliente}</strong></td>
                        <td>${orden.producto}</td>
                        <td><mark>${orden.cantidad} uds</mark></td>
                        <td>${orden.fecha}</td>
                        <td>${etiquetaEstado}</td>
                        <td>${botonAccion}</td>
                    </tr>
                `;
            });
        }

        function cambiarEstado(indice, nuevoEstado) {
            let listaActual = obtenerOrdenes();
            listaActual[indice].estado = nuevoEstado;
            localStorage.setItem("misOrdenesEstructuradas", JSON.stringify(listaActual));
            mostrarOrdenes();
        }


        // --- FUNCIONES PARA EL HISTORIAL (NUEVAS) ---
        function obtenerHistorial() {
            let datos = localStorage.getItem("misOrdenesTerminadas");
            return datos ? JSON.parse(datos) : [];
        }

        // Esta función hace la "mudanza" de una tabla a la otra
        function terminarOrden(indice) {
            let listaActual = obtenerOrdenes();
            let historial = obtenerHistorial();

            // 1. Sacamos la orden de la lista de activas
            let ordenTerminada = listaActual.splice(indice, 1)[0];
            
            // 2. Le cambiamos el estado a Terminado
            ordenTerminada.estado = "Terminado";

            // 3. La metemos en el historial
            historial.push(ordenTerminada);

            // 4. Guardamos ambos cambios en la memoria del navegador
            localStorage.setItem("misOrdenesEstructuradas", JSON.stringify(listaActual));
            localStorage.setItem("misOrdenesTerminadas", JSON.stringify(historial));

            // 5. Volvemos a dibujar ambas tablas para que se vea el cambio
            mostrarOrdenes();
            mostrarHistorial();
        }

        function mostrarHistorial() {
            let historial = obtenerHistorial();
            let tablaHistorialHTML = document.getElementById("tablaHistorial");
            tablaHistorialHTML.innerHTML = "";

            if(historial.length === 0) {
                tablaHistorialHTML.innerHTML = `<tr><td colspan="5" style="text-align: center; color: gray;">Aún no has terminado ningún trabajo.</td></tr>`;
                return;
            }

            // Mostramos el historial (las más nuevas arriba)
            historial.reverse().forEach((orden) => {
                tablaHistorialHTML.innerHTML += `
                    <tr>
                        <td><del>${orden.cliente}</del></td>
                        <td>${orden.producto}</td>
                        <td>${orden.cantidad} uds</td>
                        <td>${orden.fecha}</td>
                        <td><span style="color: #2aa198;">🟢 Entregado</span></td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
