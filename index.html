<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de mi Taller</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <main class="container-fluid" style="padding: 20px;">
        <h1>⚙️ Panel de Control del Taller (Nube ☁️)</h1>
        <hr>
        
        <section>
            <h3>Nueva Orden de Producción</h3>
            <form id="formularioOrden" onsubmit="event.preventDefault(); guardarOrden();">
                <div class="grid">
                    <label>Cliente
                        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" required>
                    </label>
                    <label>Producto a Fabricar
                        <input type="text" id="producto" placeholder="Ej: Engranaje 10mm" required>
                    </label>
                </div>
                <div class="grid">
                    <label>Cantidad
                        <input type="number" id="cantidad" placeholder="0" min="1" required>
                    </label>
                    <label>Fecha de Entrega
                        <input type="date" id="fecha" required>
                    </label>
                </div>
                <button type="submit" style="margin-top: 15px;">Crear Orden de Trabajo</button>
            </form>
        </section>

        <section style="margin-top: 30px; margin-bottom: 30px; background-color: #1a242f; padding: 15px; border-radius: 8px;">
            <label for="buscadorCliente" style="font-weight: bold; margin-bottom: 5px; display: block;">🔍 Filtrar por Cliente:</label>
            <input type="search" id="buscadorCliente" placeholder="Escribe el nombre del cliente para filtrar..." oninput="mostrarTablas()">
        </section>

        <section>
            <h3>📋 Órdenes de Trabajo Activas</h3>
            <figure>
                <table role="grid">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Entrega</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaDeOrdenes"></tbody>
                </table>
            </figure>
        </section>

        <section style="margin-top: 50px;">
            <h3>📦 Historial de Trabajos Entregados</h3>
            <figure>
                <table role="grid" style="background-color: #141e26;">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Fecha Pactada</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorial"></tbody>
                </table>
            </figure>
        </section>
    </main>

    <script>
        // =========================================================
        // REEMPLAZA LAS LÍNEAS DE ABAJO CON TUS DATOS DE FIREBASE:
        // =========================================================
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUÍ",
            authDomain: "TU_AUTH_DOMAIN_AQUÍ",
            projectId: "TU_PROJECT_ID_AQUÍ",
            storageBucket: "TU_STORAGE_BUCKET_AQUÍ",
            messagingSenderId: "TU_MESSAGING_SENDER_ID_AQUÍ",
            appId: "TU_APP_ID_AQUÍ"
        };
        // =========================================================

        // Inicializamos Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Variable local para guardar lo que viene de la nube
        let todasLasOrdenes = [];

        // ESCUCHA EN TIEMPO REAL: Cada vez que cambie algo en la nube, esto se ejecuta solo
        db.collection("ordenes").onSnapshot((snapshot) => {
            todasLasOrdenes = [];
            snapshot.forEach((doc) => {
                todasLasOrdenes.push({ id: doc.id, ...doc.data() });
            });
            mostrarTablas(); // Redibuja la pantalla con los datos nuevos de la nube
        });

        function guardarOrden() {
            let cliente = document.getElementById("cliente").value.trim();
            let producto = document.getElementById("producto").value.trim();
            let cantidad = document.getElementById("cantidad").value;
            let fecha = document.getElementById("fecha").value;
            
            let nuevaOrden = {
                cliente: cliente,
                producto: producto,
                cantidad: parseInt(cantidad),
                fecha: fecha,
                estado: "Pendiente" 
            };
            
            // Enviamos los datos directamente a la nube de Firebase
            db.collection("ordenes").add(nuevaOrden);
            
            document.getElementById("formularioOrden").reset();
        }

        function cambiarEstado(id, nuevoEstado) {
            // Actualiza el documento en la nube usando su ID único
            db.collection("ordenes").doc(id).update({ estado: nuevoEstado });
        }

        function mostrarTablas() {
            let tablaActivasHTML = document.getElementById("tablaDeOrdenes");
            let tablaHistorialHTML = document.getElementById("tablaHistorial");
            
            tablaActivasHTML.innerHTML = "";
            tablaHistorialHTML.innerHTML = "";

            let terminoBusqueda = document.getElementById("buscadorCliente").value.toLowerCase();

            // Filtramos las órdenes según el buscador
            let ordenesFiltradas = todasLasOrdenes.filter(orden => 
                orden.cliente.toLowerCase().includes(terminoBusqueda)
            );

            let tieneActivas = false;
            let tieneHistorial = false;

            // Separamos y dibujamos las órdenes
            ordenesFiltradas.forEach((orden) => {
                if (orden.estado === "Pendiente" || orden.estado === "En proceso") {
                    tieneActivas = true;
                    let etiquetaEstado = orden.estado === "Pendiente" ? `<span style="color: #b58900;">🟡 Pendiente</span>` : `<span style="color: #268bd2; font-weight: bold;">🔵 En proceso</span>`;
                    let botonAccion = orden.estado === "Pendiente" ? 
                        `<button class="outline" style="width: auto; margin: 0; padding: 2px 10px;" onclick="cambiarEstado('${orden.id}', 'En proceso')">▶ Iniciar</button>` : 
                        `<button class="outline contrast" style="width: auto; margin: 0; padding: 2px 10px;" onclick="cambiarEstado('${orden.id}', 'Terminado')">✓ Terminar</button>`;

                    tablaActivasHTML.innerHTML += `
                        <tr>
                            <td><strong>${orden.cliente}</strong></td>
                            <td>${orden.producto}</td>
                            <td><mark>${orden.cantidad} uds</mark></td>
                            <td>${orden.fecha}</td>
                            <td>${etiquetaEstado}</td>
                            <td>${botonAccion}</td>
                        </tr>
                    `;
                } else if (orden.estado === "Terminado") {
                    tieneHistorial = true;
                    tablaHistorialHTML.innerHTML = `
                        <tr>
                            <td><del>${orden.cliente}</del></td>
                            <td>${orden.producto}</td>
                            <td>${orden.cantidad} uds</td>
                            <td>${orden.fecha}</td>
                            <td><span style="color: #2aa198;">🟢 Entregado</span></td>
                        </tr>
                    ` + tablaHistorialHTML.innerHTML; // Hack para que los nuevos terminados queden arriba
                }
            });

            if (!tieneActivas) {
                tablaActivasHTML.innerHTML = `<tr><td colspan="6" style="text-align: center; color: gray;">No hay órdenes activas.</td></tr>`;
            }
            if (!tieneHistorial) {
                tablaHistorialHTML.innerHTML = `<tr><td colspan="5" style="text-align: center; color: gray;">No hay trabajos en el historial.</td></tr>`;
            }
        }
    </script>
</body>
</html>
