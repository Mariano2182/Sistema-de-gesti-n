<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENG - Sistema de Hoja de Ruta Digital</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #268bd2;
        }
        @keyframes parpadeoAlerta {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .alerta-hoy {
            animation: parpadeoAlerta 1.2s infinite ease-in-out;
            background-color: #d9411e !important;
            color: white !important;
        }
        .badge-fecha {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            font-size: 0.85rem;
        }
        .header-taller {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        #pantallaLogin {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            background-color: #1a242f;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }
        .btn-usuario {
            margin-bottom: 12px;
            text-align: left;
            padding-left: 20px;
        }
        .bloque-nota {
            display: block;
            margin-top: 6px;
            background-color: #232e3c;
            padding: 6px 10px;
            border-left: 4px solid #cb4b16;
            color: #e2e8f0;
            border-radius: 0 6px 6px 0;
            font-size: 0.8rem;
        }
        .contenedor-ruta-visual {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
            font-size: 0.8rem;
        }
        .paso-card-visual {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .paso-card-visual.en-proceso { border-left: 5px solid #268bd2; background-color: #14253d; }
        .paso-card-visual.pausado { border-left: 5px solid #cb4b16; }
        .paso-card-visual.terminado { border-left: 5px solid #2aa198; opacity: 0.7; }
        .paso-card-visual.pendiente { border-left: 5px solid #64748b; }

        .instrumentos-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
            background: #0f172a;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .instrumento-tag {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .instrumento-tag.checked {
            color: #38bdf8;
            font-weight: bold;
        }
        .fila-paso-form {
            background: #141e26;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #268bd2;
        }
    </style>
</head>
<body>

    <div id="pantallaLogin">
        <h2>🚀 VENG - Control de Planta</h2>
        <p style="color: gray;">Selecciona tu usuario para ingresar al sistema</p>
        <hr>
        <button class="btn-usuario" onclick="iniciarSesion('admin')">👔 Administrador / Oficina Técnica</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('Fernando Morano')">🛠️ Fernando Morano</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('David Díaz')">🛠️ David Díaz</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('Jorge Quinteros')">🛠️ Jorge Quinteros</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('Gerardo Barbero')">🛠️ Gerardo Barbero</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('Sebastián Díaz')">🛠️ Sebastián Díaz</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('Mariano Ramírez')">🛠️ Mariano Ramírez</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('Gustavo Fernández')">🛠️ Gustavo Fernández</button>
        <button class="btn-usuario secondary" onclick="iniciarSesion('Enzo Ficarra')">🛠️ Enzo Ficarra</button>
    </div>

    <main class="container-fluid" id="pantallaPrincipal" style="padding: 20px; display: none;">
        
        <div class="header-taller">
            <div>
                <h1>🚀 HOJA DE RUTA DIGITAL (Estándar VENG)</h1>
                <p style="margin: 0; color: #268bd2;">Usuario activo: <strong id="nombreUsuarioActivo">---</strong></p>
            </div>
            <div>
                <button class="outline contrast" onclick="cerrarSesion()" style="width: auto; padding: 5px 15px; margin: 0;"></div>
            </div>
        </div>
        <hr>
        
        <section id="seccionFormulario">
            <h3 id="tituloFormulario">Nueva Hoja de Ruta - Oficina Técnica</h3>
            <form id="formularioOrden" onsubmit="event.preventDefault(); guardarOrden();">
                
                <div class="grid">
                    <label>OT (Orden de Trabajo)
                        <input type="text" id="ot" placeholder="Ej: 1014" required>
                    </label>
                    <label>POS (Posición)
                        <input type="text" id="pos" placeholder="Ej: 001" required>
                    </label>
                    <label>Nº Plano / Parte
                        <input type="text" id="nPlano" placeholder="Ej: s/n o Código de plano" required>
                    </label>
                </div>

                <div class="grid">
                    <label>Solicitante / Cliente
                        <input type="text" id="cliente" placeholder="Ej: Bianchi Carlos Roberto" required>
                    </label>
                    <label>Proyecto
                        <input type="text" id="proyecto" placeholder="Ej: Corrección cabezal / N/A" required>
                    </label>
                    <label>Área
                        <input type="text" id="area" placeholder="Ej: Comercial / Manufactura" required>
                    </label>
                </div>

                <div class="grid">
                    <label>Denominación de la Pieza
                        <input type="text" id="producto" placeholder="Ej: Eje motriz" required>
                    </label>
                    <label>Material (Calidad)
                        <input type="text" id="material" placeholder="Ej: Fundición / SAE 4140" required>
                    </label>
                    <label>Nivel CAL
                        <input type="text" id="nivelCal" placeholder="Ej: OT Man.">
                    </label>
                </div>

                <div class="grid">
                    <label>Cantidad
                        <input type="number" id="cantidad" placeholder="1" min="1" required>
                    </label>
                    <label>Fecha Límite de Entrega
                        <input type="date" id="fecha" required>
                    </label>
                </div>

                <div style="background-color: #1a242f; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h4 style="margin: 0; color: #268bd2;">📋 Secuencia Operacional (Ruta)</h4>
                        <button type="button" class="button" style="width: auto; padding: 4px 12px; margin:0;" onclick="agregarFilaPaso()">➕ Agregar Operación</button>
                    </div>
                    <div id="contenedorPasosForm"></div>
                </div>

                <div class="grid">
                    <label>Observaciones Iniciales
                        <input type="text" id="notas" placeholder="Escribir aquí instrucciones generales para la planta...">
                    </label>
                </div>
                <button type="submit" id="btnFormulario" style="margin-top: 15px;">Emitir Hoja de Ruta</button>
            </form>
        </section>

        <section style="margin-top: 30px; margin-bottom: 30px; background-color: #1a242f; padding: 15px; border-radius: 8px;">
            <div class="grid" style="margin-bottom: 0;">
                <div>
                    <label for="buscadorCliente" style="font-weight: bold;">🔍 Filtrar por Cliente/Solicitante:</label>
                    <input type="search" id="buscadorCliente" placeholder="Escribe para buscar..." oninput="mostrarTablas()">
                </div>
                <div>
                    <label for="buscadorOT" style="font-weight: bold;">🔢 Filtrar por OT:</label>
                    <input type="search" id="buscadorOT" placeholder="Buscar por número de OT..." oninput="mostrarTablas()">
                </div>
            </div>
        </section>

        <section>
            <h3>📋 Hojas de Ruta Activas en Planta</h3>
            <figure>
                <table role="grid">
                    <thead>
                        <tr>
                            <th style="width: 100px;">OT / POS</th>
                            <th style="width: 180px;">Cliente / Plano</th>
                            <th>Denominación de Pieza y Hoja de Ruta Activa</th>
                            <th style="width: 80px;">Cant.</th>
                            <th style="width: 140px;">Plazo Entrega</th>
                            <th style="width: 150px;">Estado Actual</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaDeOrdenes"></tbody>
                </table>
            </figure>
        </section>

        <section style="margin-top: 50px;">
            <h3>📦 Historial de Trabajos Finalizados (Entregados)</h3>
            <figure>
                <table role="grid" style="background-color: #141e26;">
                    <thead>
                        <tr>
                            <th>OT / POS</th>
                            <th>Cliente / Plano</th>
                            <th>Denominación de Pieza / Ruta Ejecutada</th>
                            <th>Cant.</th>
                            <th>Fecha Fin</th>
                            <th>Tiempos Totales</th>
                            <th id="columnaAccionesHistorial">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorial"></tbody>
                </table>
            </figure>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1gyEhjH-hVrSiCpkqCEFvISA4dFo3Yn8",
            authDomain: "sgi-v01.firebaseapp.com",
            databaseURL: "https://sgi-v01-default-rtdb.firebaseio.com",
            projectId: "sgi-v01",
            storageBucket: "sgi-v01.firebasestorage.app",
            messagingSenderId: "393270414199",
            appId: "1:393270414199:web:c46753d5fbbcb7a033ef72",
            measurementId: "G-G183P4YRVF"
        };

        const LISTA_TAREAS = ["Corte Material", "CAD", "CAM", "Hoja de Proceso", "Torneado Desbaste", "Torneado de Terminación", "Frenteado", "Fresado", "Perforado", "Roscado", "Perforado-Roscado", "Grabado", "Tronzado", "Avellanado", "Corte por Hilo", "Electro Erosión", "Rectificado", "Tratamiento Térmico", "Cromado", "DMD", "Escareado", "Soldadura", "Blastinado", "Corte Laser CO2", "Integración", "Inspección Visual", "Control Dimensional", "FIT Check", "Mantenimiento Preventivo", "Mantenimiento Correctivo", "Mecanizado de Dispositivo", "Rolado", "Materiales", "Herramientas", "Retrabajo", "Medición pie de Máquina", "Rebarbado", "Niquelado", "Zincado", "Medición de Dureza", "Ingeniería", "CAD-CAM", "Planeado", "Torneado"];
        const LISTA_OPERARIOS = ["Fernando Morano", "David Díaz", "Jorge Quinteros", "Gerardo Barbero", "Sebastián Díaz", "Mariano Ramírez", "Gustavo Fernández", "Enzo Ficarra"];
        const INSTRUMENTOS_MEDICION = ["ME-01131", "ME-01119", "ME-01147", "ME-1241", "ME-01078", "ME-00541"];

        let db;
        let todasLasOrdenes = [];
        let idEditando = null;
        let usuarioLogueado = null; 
        let esAdmin = false;

        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();

            let sesionGuardada = localStorage.getItem("usuarioTaller");
            if (sesionGuardada) {
                usuarioLogueado = sesionGuardada;
                esAdmin = (sesionGuardada === "admin");
                conectarEscuchaFirebase();
            }
        } catch (e) {
            alert("Error crítico de inicialización: " + e.message);
        }

        function agregarFilaPaso(opPrev="", maquinaPrev="", tareaPrev="", operarioPrev="", instsChecked=[]) {
            const contenedor = document.getElementById("contenedorPasosForm");
            const totalFilas = contenedor.children.length;
            const opSugerida = opPrev || (totalFilas + 1) * 10;
            
            let opcionesTareas = `<option value="" disabled ${tareaPrev ? '' : 'selected'}>Selecciona la operación...</option>`;
            LISTA_TAREAS.forEach(t => opcionesTareas += `<option value="${t}" ${t === tareaPrev ? 'selected' : ''}>${t}</option>`);

            let opcionesOperarios = `<option value="" disabled ${operarioPrev ? '' : 'selected'}>Selecciona el operario...</option>`;
            LISTA_OPERARIOS.forEach(o => opcionesOperarios += `<option value="${o}" ${o === operarioPrev ? 'selected' : ''}>${o}</option>`);

            let checkboxInstrumentosHTML = "";
            INSTRUMENTOS_MEDICION.forEach(inst => {
                const checked = instsChecked.includes(inst) ? "checked" : "";
                checkboxInstrumentosHTML += `
                    <label style="display:inline-flex; align-items:center; margin-right:10px; font-size:0.75rem;">
                        <input type="checkbox" class="chk-instrumento" value="${inst}" ${checked} style="margin-right:4px;"> ${inst}
                    </label>
                `;
            });

            const divFila = document.createElement("div");
            divFila.className = "fila-paso-form";
            divFila.innerHTML = `
                <div class="grid" style="margin-bottom:10px;">
                    <div style="max-width:80px;">
                        <label>OP</label>
                        <input type="number" class="input-op-ruta" value="${opSugerida}" required>
                    </div>
                    <div>
                        <label>Máquina / Puesto</label>
                        <input type="text" class="input-maquina-ruta" value="${maquinaPrev}" placeholder="Ej: ACRA / TAREA MANUAL" required>
                    </div>
                    <div>
                        <label>Operación</label>
                        <select class="select-tarea-ruta" required>${opcionesTareas}</select>
                    </div>
                    <div>
                        <label>Asignado A</label>
                        <select class="select-operario-ruta" required>${opcionesOperarios}</select>
                    </div>
                    <div style="display:flex; align-items:flex-end; padding-bottom:5px;">
                        <button type="button" class="outline" style="border-color:#d93526; color:#d93526; margin:0; padding:4px 10px;" onclick="this.parentElement.parentElement.parentElement.remove();">❌ Quitar</button>
                    </div>
                </div>
                <div style="border-top: 1px dashed #334155; padding-top:8px;">
                    <strong style="font-size:0.75rem; color:#268bd2; display:block; margin-bottom:4px;">📐 Medición Pie de Máquina (Cotas Generales):</strong>
                    ${checkboxInstrumentosHTML}
                </div>
            `;
            contenedor.appendChild(divFila);
        }

        function formatoTiempo(milisegundos) {
            if (!milisegundos || milisegundos <= 0) return "0m";
            let totalMinutos = Math.floor(milisegundos / 60000);
            let horas = Math.floor(totalMinutos / 60);
            let minutos = totalMinutos % 60;
            if (horas > 0) return `${horas}h ${minutos}m`;
            return `${minutos}m`;
        }

        function iniciarSesion(usuario) {
            if (usuario === "admin") {
                let pin = prompt("Introduce el PIN de Oficina Técnica:");
                if (pin === "1234") { usuarioLogueado = "admin"; esAdmin = true; } 
                else { alert("❌ PIN Incorrecto."); return; }
            } else {
                let pin = prompt(`Introduce PIN para ${usuario}:`);
                if (pin === "0000") { usuarioLogueado = usuario; esAdmin = false; } 
                else { alert("❌ PIN Incorrecto."); return; }
            }
            localStorage.setItem("usuarioTaller", usuarioLogueado);
            conectarEscuchaFirebase();
        }

        function cerrarSesion() {
            localStorage.removeItem("usuarioTaller");
            usuarioLogueado = null; esAdmin = false;
            document.getElementById("pantallaPrincipal").style.display = "none";
            document.getElementById("pantallaLogin").style.display = "block";
        }

        function conectarEscuchaFirebase() {
            document.getElementById("pantallaLogin").style.display = "none";
            document.getElementById("pantallaPrincipal").style.display = "block";
            document.getElementById("nombreUsuarioActivo").innerText = esAdmin ? "👔 Oficina Técnica (Admin)" : `🛠️ Operario: ${usuarioLogueado}`;

            document.getElementById("seccionFormulario").style.display = esAdmin ? "block" : "none";
            document.getElementById("columnaAccionesHistorial").style.display = esAdmin ? "table-cell" : "none";

            document.getElementById("contenedorPasosForm").innerHTML = "";
            if(esAdmin) agregarFilaPaso();

            db.collection("ordenes_veng").onSnapshot((snapshot) => {
                todasLasOrdenes = [];
                snapshot.forEach((doc) => {
                    todasLasOrdenes.push({ id: doc.id, ...doc.data() });
                });
                mostrarTablas();
            });
        }

        function guardarOrden() {
            if (!db || !esAdmin) return;
            
            const filasPasos = document.querySelectorAll("#contenedorPasosForm .fila-paso-form");
            if (filasPasos.length === 0) {
                alert("⚠️ Debes agregar al menos una operación a la Hoja de Ruta.");
                return;
            }

            let pasosArray = [];
            filasPasos.forEach((fila) => {
                let opSel = fila.querySelector(".input-op-ruta").value;
                let maquinaSel = fila.querySelector(".input-maquina-ruta").value.trim();
                let tareaSel = fila.querySelector(".select-tarea-ruta").value;
                let operarioSel = fila.querySelector(".select-operario-ruta").value;
                
                let instsChecked = [];
                fila.querySelectorAll(".chk-instrumento:checked").forEach(chk => {
                    instsChecked.push(chk.value);
                });

                pasosArray.push({
                    op: parseInt(opSel),
                    maquina: maquinaSel,
                    tarea: tareaSel,
                    asignadoA: operarioSel,
                    instrumentos: instsChecked,
                    estado: "Pendiente",
                    tiempoAcumulado: 0,
                    horaInicio: null,
                    notas: ""
                });
            });

            // Ordenamiento por nro de OP secuencial
            pasosArray.sort((a,b) => a.op - b.op);

            let ordenAnterior = idEditando ? todasLasOrdenes.find(o => o.id === idEditando) : null;
            
            let datosOrden = {
                ot: document.getElementById("ot").value.trim(),
                pos: document.getElementById("pos").value.trim(),
                nPlano: document.getElementById("nPlano").value.trim(),
                cliente: document.getElementById("cliente").value.trim(),
                proyecto: document.getElementById("proyecto").value.trim(),
                area: document.getElementById("area").value.trim(),
                producto: document.getElementById("producto").value.trim(),
                material: document.getElementById("material").value.trim(),
                nivelCal: document.getElementById("nivelCal").value.trim(),
                cantidad: parseInt(document.getElementById("cantidad").value),
                fecha: document.getElementById("fecha").value,
                notas: document.getElementById("notas").value.trim(),
                pasos: idEditando && ordenAnterior.pasos ? ordenAnterior.pasos : pasosArray,
                estado: idEditando ? ordenAnterior.estado : "Pendiente"
            };
            
            if (idEditando) {
                db.collection("ordenes_veng").doc(idEditando).update(datosOrden)
                .then(() => {
                    idEditando = null;
                    document.getElementById("btnFormulario").innerText = "Emitir Hoja de Ruta";
                    document.getElementById("formularioOrden").reset();
                    document.getElementById("contenedorPasosForm").innerHTML = "";
                    agregarFilaPaso();
                });
            } else {
                db.collection("ordenes_veng").add(datosOrden)
                .then(() => {
                    document.getElementById("formularioOrden").reset();
                    document.getElementById("contenedorPasosForm").innerHTML = "";
                    agregarFilaPaso();
                });
            }
        }

        function cambiarEstado(id, nuevoEstado) {
            let orden = todasLasOrdenes.find(o => o.id === id);
            if (!orden) return;

            let pasos = orden.pasos;
            let idxActivo = pasos.findIndex(p => p.estado !== "Terminado");
            if (idxActivo === -1) idxActivo = pasos.length - 1;

            let paso = pasos[idxActivo];
            let ahora = Date.now();

            if (nuevoEstado === "En proceso") {
                paso.horaInicio = ahora;
                paso.estado = "En proceso";
            } else if (nuevoEstado === "Pausado") {
                let motivo = prompt("Motivo de Pausa / Notas:", paso.notas || "");
                if (motivo !== null) paso.notas = motivo.trim();
                if (paso.horaInicio) {
                    paso.tiempoAcumulado = (paso.tiempoAcumulado || 0) + (ahora - paso.horaInicio);
                    paso.horaInicio = null;
                }
                paso.estado = "Pausado";
            } else if (nuevoEstado === "Terminado") {
                let notaFinal = prompt("Anotaciones finales de cierre de operación:", paso.notas || "");
                if (notaFinal !== null) paso.notas = notaFinal.trim();
                if (paso.horaInicio) {
                    paso.tiempoAcumulado = (paso.tiempoAcumulado || 0) + (ahora - paso.horaInicio);
                    paso.horaInicio = null;
                }
                paso.estado = "Terminado";
            }

            let ordenEstadoGlobal = pasos.every(p => p.estado === "Terminado") ? "Terminado" : "En proceso";

            db.collection("ordenes_veng").doc(id).update({ pasos: pasos, estado: ordenEstadoGlobal });
        }

        function marcarInstrumentoMesa(idOrden, idxPaso, instVal, checkStatus) {
            let orden = todasLasOrdenes.find(o => o.id === idOrden);
            if (!orden) return;
            
            // Inicializar array verificado si no existía por retrocompatibilidad
            if(!orden.pasos[idxPaso].instrumentosVerificadosTaller) {
                orden.pasos[idxPaso].instrumentosVerificadosTaller = [];
            }
            
            let verificados = orden.pasos[idxPaso].instrumentosVerificadosTaller;
            if(checkStatus) {
                if(!verificados.includes(instVal)) verificados.push(instVal);
            } else {
                orden.pasos[idxPaso].instrumentosVerificadosTaller = verificados.filter(i => i !== instVal);
            }
            
            db.collection("ordenes_veng").doc(idOrden).update({ pasos: orden.pasos });
        }

        function editarOrden(id) {
            let orden = todasLasOrdenes.find(o => o.id === id);
            if (!orden) return;
            document.getElementById("ot").value = orden.ot || "";
            document.getElementById("pos").value = orden.pos || "";
            document.getElementById("nPlano").value = orden.nPlano || "";
            document.getElementById("cliente").value = orden.cliente;
            document.getElementById("proyecto").value = orden.proyecto || "";
            document.getElementById("area").value = orden.area || "";
            document.getElementById("producto").value = orden.producto;
            document.getElementById("material").value = orden.material || "";
            document.getElementById("nivelCal").value = orden.nivelCal || "";
            document.getElementById("cantidad").value = orden.cantidad;
            document.getElementById("fecha").value = orden.fecha;
            document.getElementById("notas").value = orden.notas || "";
            
            document.getElementById("contenedorPasosForm").innerHTML = "";
            orden.pasos.forEach(p => agregarFilaPaso(p.op, p.maquina, p.tarea, p.asignadoA, p.instrumentos || []));
            
            idEditando = id;
            document.getElementById("btnFormulario").innerText = "💾 Guardar Cambios en Ruta";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function eliminarOrden(id) {
            if (confirm("🚨 ¿Eliminar esta Hoja de Ruta de VENG de forma permanente?")) {
                db.collection("ordenes_veng").doc(id).delete();
            }
        }

        function mostrarTablas() {
            let tablaActivasHTML = document.getElementById("tablaDeOrdenes");
            let tablaHistorialHTML = document.getElementById("tablaHistorial");
            
            tablaActivasHTML.innerHTML = "";
            tablaHistorialHTML.innerHTML = "";

            let busquedaCliente = document.getElementById("buscadorCliente").value.toLowerCase();
            let busquedaOT = document.getElementById("buscadorOT").value.trim();
            let hoy = new Date(); hoy.setHours(0,0,0,0);

            todasLasOrdenes.forEach((orden) => {
                let pasos = orden.pasos || [];
                let idxPasoActivo = pasos.findIndex(p => p.estado !== "Terminado");
                let pasoActivo = idxPasoActivo !== -1 ? pasos[idxPasoActivo] : pasos[pasos.length - 1];

                // Filtros combinados
                if (busquedaCliente && !orden.cliente.toLowerCase().includes(busquedaCliente)) return;
                if (busquedaOT && orden.ot !== busquedaOT) return;

                // Restricción de vista Operario (Solo ve si tiene la tarea activa asignada)
                if (!esAdmin && orden.estado !== "Terminado") {
                    if (pasoActivo.asignadoA !== usuarioLogueado) return;
                }

                let tiempoTotalRuta = 0;
                let htmlRutaVisual = `<div class="contenedor-ruta-visual">`;
                
                pasos.forEach((p, idx) => {
                    tiempoTotalRuta += (p.tiempoAcumulado || 0);
                    let claseE = p.estado.toLowerCase().replace(" ", "-");
                    let icon = p.estado === "Terminado" ? "✓" : (p.estado === "En proceso" ? "⏳ 🔵" : (p.estado === "Pausado" ? "⏸️" : "⚪"));
                    
                    // Render de instrumentos configurados para esta operación
                    let htmlInstrumentosPaso = "";
                    if(p.instrumentos && p.instrumentos.length > 0) {
                        htmlInstrumentosPaso = `<div class="instrumentos-container">`;
                        p.instrumentos.forEach(ins => {
                            let verifList = p.instrumentosVerificadosTaller || [];
                            let IsChecked = verifList.includes(ins);
                            
                            if(orden.estado !== "Terminado" && p.estado === "En proceso" && !esAdmin) {
                                // El operario puede marcar/chequear el instrumento en tiempo real
                                htmlInstrumentosPaso += `
                                    <label class="instrumento-tag ${IsChecked?'checked':''}">
                                        <input type="checkbox" style="margin:0 3px 0 0; width:12px; height:12px;" ${IsChecked?'checked':''} onchange="marcarInstrumentoMesa('${orden.id}', ${idx}, '${ins}', this.checked)"> ${ins}
                                    </label>
                                `;
                            } else {
                                // Vista estática normal
                                htmlInstrumentosPaso += `<span class="instrumento-tag ${IsChecked?'checked':''}">⚙️ ${ins}${IsChecked?' (OK)':''}</span>`;
                            }
                        });
                        htmlInstrumentosPaso += `</div>`;
                    }

                    htmlRutaVisual += `
                        <div class="paso-card-visual ${claseE}">
                            <strong>OP ${p.op} - Mág: ${p.maquina}</strong> | <span>${p.tarea}</span> 
                            <span style="float:right; font-weight:bold;">${icon} ${p.asignadoA}</span>
                            ${htmlInstrumentosPaso}
                            ${p.notas ? `<div style="color:#fda4af; font-size:0.7rem; margin-top:3px;">💬 ${p.notas}</div>`:''}
                        </div>
                    `;
                });
                htmlRutaVisual += `</div>`;

                if (orden.estado !== "Terminado") {
                    // --- TABLA ACTIVAS ---
                    let celdaFecha = "";
                    if (orden.fecha) {
                        const fEntrega = new Date(orden.fecha + 'T00:00:00');
                        const dif = Math.floor((fEntrega - hoy) / (1000 * 60 * 60 * 24));
                        if (dif < 0) celdaFecha = `<span class="badge-fecha" style="background-color: #721c24;">🔴 Retrasado (${Math.abs(dif)}d)</span>`;
                        else if (dif === 0) celdaFecha = `<span class="badge-fecha alerta-hoy">🚨 HOY</span>`;
                        else if (dif <= 4) celdaFecha = `<span class="badge-fecha" style="background-color: #b58900;">🟡 ${dif} días</span>`;
                        else celdaFecha = `<span class="badge-fecha" style="background-color: #2aa198;">🟢 ${dif} días</span>`;
                    }

                    let btnAccion = "";
                    if (pasoActivo.estado === "Pendiente") {
                        btnAccion = `<button class="outline" style="padding:2px 8px; margin:0;" onclick="cambiarEstado('${orden.id}', 'En proceso')">▶ Iniciar OP ${pasoActivo.op}</button>`;
                    } else if (pasoActivo.estado === "En proceso") {
                        btnAccion = `
                            <button class="outline" style="padding:2px 8px; margin:0 4px 0 0; border-color:#cb4b16; color:#cb4b16;" onclick="cambiarEstado('${orden.id}', 'Pausado')">⏸ Pausar</button>
                            <button class="outline contrast" style="padding:2px 8px; margin:0;" onclick="cambiarEstado('${orden.id}', 'Terminado')">✓ Cerrar OP</button>
                        `;
                    } else if (pasoActivo.estado === "Pausado") {
                        btnAccion = `
                            <button class="outline" style="padding:2px 8px; margin:0 4px 0 0;" onclick="cambiarEstado('${orden.id}', 'En proceso')">▶ Reanudar</button>
                            <button class="outline contrast" style="padding:2px 8px; margin:0;" onclick="cambiarEstado('${orden.id}', 'Terminado')">✓ Cerrar OP</button>
                        `;
                    }

                    let accionesAdmin = "";
                    if (esAdmin) {
                        accionesAdmin = `
                            <button style="background:transparent; border-color:#ffa600; color:#ffa600; padding:2px 6px; margin:0 3px 0 0;" onclick="editarOrden('${orden.id}')">✏️</button>
                            <button style="background:transparent; border-color:#d93526; color:#d93526; padding:2px 6px; margin:0;" onclick="eliminarOrden('${orden.id}')">❌</button>
                        `;
                    }

                    tablaActivasHTML.innerHTML += `
                        <tr>
                            <td><strong>OT ${orden.ot || '---'}</strong><br><small style="color:gray;">POS: ${orden.pos || '---'}</small></td>
                            <td><span style="font-size:0.85rem; font-weight:bold;">${orden.cliente}</span><br><small style="color:#268bd2;">Plano: ${orden.nPlano || 's/n'}</small></td>
                            <td>
                                <strong style="color:#e2e8f0; font-size:1.05rem;">${orden.producto}</strong> <small style="color:gray;">(${orden.material || '---'})</small>
                                ${htmlRutaVisual}
                                ${orden.notas ? `<span class="bloque-nota">📝 Obs. OT: ${orden.notas}</span>`:''}
                            </td>
                            <td><strong>${orden.cantidad}</strong></td>
                            <td>${celdaFecha}</td>
                            <td>
                                <span style="font-size:0.85rem; color:#94a3b8;">OP Activa: <strong>${pasoActivo.op}</strong></span><br>
                                <small style="color:#818cf8;">⏱️ Acumulado: ${formatoTiempo(pasoActivo.tiempoAcumulado)}</small>
                            </td>
                            <td>
                                <div style="display:flex; align-items:center; gap:2px;">
                                    ${btnAccion}
                                    ${accionesAdmin}
                                </div>
                            </td>
                        </tr>
                    `;
                } else {
                    // --- TABLA HISTORIAL (ENTREGADOS) ---
                    let accionesAdminHistorial = esAdmin ? `
                        <button style="background:transparent; border-color:#ffa600; color:#ffa600; padding:2px 6px; margin:0 3px 0 0;" onclick="editarOrden('${orden.id}')">✏️</button>
                        <button style="background:transparent; border-color:#d93526; color:#d93526; padding:2px 6px; margin:0;" onclick="eliminarOrden('${orden.id}')">❌</button>
                    ` : '';

                    tablaHistorialHTML.innerHTML += `
                        <tr>
                            <td><strong>OT ${orden.ot || '---'}</strong><br><small>POS: ${orden.pos || '---'}</small></td>
                            <td><strong>${orden.cliente}</strong><br><small style="color:gray;">Plano: ${orden.nPlano || 's/n'}</small></td>
                            <td>
                                <strong>${orden.producto}</strong>
                                ${htmlRutaVisual}
                            </td>
                            <td>${orden.cantidad}</td>
                            <td>${orden.fecha || '---'}</td>
                            <td>
                                <span style="color:#2aa198; font-weight:bold;">🟢 Cerrado</span><br>
                                <small style="color:gray;">Tiempo de Proceso: ${formatoTiempo(tiempoTotalRuta)}</small>
                            </td>
                            <td style="display: ${esAdmin ? 'table-cell' : 'none'};">${accionesAdminHistorial}</td>
                        </tr>
                    `;
                }
            });
        }
    </script>
</body>
</html>
