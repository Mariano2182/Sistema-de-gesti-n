<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de mi Taller</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @keyframes parpadeoAlerta {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .alerta-hoy {
            animation: parpadeoAlerta 1.2s infinite ease-in-out;
            background-color: #d9411e !important;
            color: white !important;
        }
        .badge-fecha {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <main class="container-fluid" style="padding: 20px;">
        <h1>⚙️ Panel de Control del Taller (Nube ☁️)</h1>
        <hr>
        
        <section>
            <h3 id="tituloFormulario">Nueva Orden de Producción</h3>
            <form id="formularioOrden" onsubmit="event.preventDefault(); guardarOrden();">
                <div class="grid">
                    <label>Cliente
                        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" required>
                    </label>
                    <label>Producto a Fabricar
                        <input type="text" id="producto" placeholder="Ej: Engranaje 10mm" required>
                    </label>
                </div>
                <div class="grid">
                    <label>Cantidad
                        <input type="number" id="cantidad" placeholder="0" min="1" required>
                    </label>
                    <label>Fecha de Entrega
                        <input type="date" id="fecha" required>
                    </label>
                </div>
                <button type="submit" id="btnFormulario" style="margin-top: 15px;">Crear Orden de Trabajo</button>
            </form>
        </section>

        <section style="margin-top: 30px; margin-bottom: 30px; background-color: #1a242f; padding: 15px; border-radius: 8px;">
            <label for="buscadorCliente" style="font-weight: bold; margin-bottom: 5px; display: block;">🔍 Filtrar por Cliente:</label>
            <input type="search" id="buscadorCliente" placeholder="Escribe el nombre del cliente para filtrar..." oninput="mostrarTablas()">
        </section>

        <section>
            <h3>📋 Órdenes de Trabajo Activas</h3>
            <figure>
                <table role="grid">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Plazo / Entrega</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaDeOrdenes"></tbody>
                </table>
            </figure>
        </section>

        <section style="margin-top: 50px;">
            <h3>📦 Historial de Trabajos Entregados</h3>
            <figure>
                <table role="grid" style="background-color: #141e26;">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Fecha de Entrega</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorial"></tbody>
                </table>
            </figure>
        </section>
    </main>

    <script>
        // =========================================================
        // ⚠️ PEGA AQUÍ TUS DATOS REALES DESDE LA CONSOLA DE FIREBASE:
        // =========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA1gyEhjH-hVrSiCpkqCEFvISA4dFo3Yn8",
  authDomain: "sgi-v01.firebaseapp.com",
  databaseURL: "https://sgi-v01-default-rtdb.firebaseio.com",
  projectId: "sgi-v01",
  storageBucket: "sgi-v01.firebasestorage.app",
  messagingSenderId: "393270414199",
  appId: "1:393270414199:web:c46753d5fbbcb7a033ef72",
  measurementId: "G-G183P4YRVF"
        };
        // =========================================================

        let db;
        let todasLasOrdenes = [];
        let idEditando = null;

        try {
            if (firebaseConfig.apiKey.includes("TU_API_KEY")) {
                alert("⚠️ ATENCIÓN: No has reemplazado las credenciales de ejemplo de Firebase por tus códigos reales.");
            }
            
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();

            db.collection("ordenes").onSnapshot((snapshot) => {
                todasLasOrdenes = [];
                snapshot.forEach((doc) => {
                    todasLasOrdenes.push({ id: doc.id, ...doc.data() });
                });
                mostrarTablas();
            }, (error) => {
                alert("Error de conexión con Cloud Firestore: " + error.message);
            });

        } catch (e) {
            alert("Error crítico de inicialización: " + e.message);
        }

        function guardarOrden() {
            if (!db) return alert("No hay conexión con la base de datos.");
            
            let cliente = document.getElementById("cliente").value.trim();
            let producto = document.getElementById("producto").value.trim();
            let cantidad = document.getElementById("cantidad").value;
            let fecha = document.getElementById("fecha").value;
            
            let estadoOrden = idEditando ? todasLasOrdenes.find(o => o.id === idEditando).estado : "Pendiente";

            let datosOrden = {
                cliente: cliente,
                producto: producto,
                cantidad: parseInt(cantidad),
                fecha: fecha,
                estado: estadoOrden
            };
            
            if (idEditando) {
                db.collection("ordenes").doc(idEditando).update(datosOrden)
                .then(() => {
                    idEditando = null;
                    document.getElementById("btnFormulario").innerText = "Crear Orden de Trabajo";
                    document.getElementById("tituloFormulario").innerText = "Nueva Orden de Producción";
                    document.getElementById("formularioOrden").reset();
                })
                .catch((error) => alert("Error al actualizar: " + error.message));
            } else {
                db.collection("ordenes").add(datosOrden)
                .then(() => {
                    document.getElementById("btnFormulario").innerText = "Crear Orden de Trabajo";
                    document.getElementById("tituloFormulario").innerText = "Nueva Orden de Producción";
                    document.getElementById("formularioOrden").reset();
                })
                .catch((error) => alert("No se pudo guardar en la nube: " + error.message));
            }
        }

        function cambiarEstado(id, nuevoEstado) {
            if (!db) return;
            db.collection("ordenes").doc(id).update({ estado: nuevoEstado })
            .catch((error) => alert("No se pudo actualizar el estado: " + error.message));
        }

        function eliminarOrden(id) {
            if (confirm("⚠️ ¿Estás seguro de que deseas ELIMINAR esta orden de forma permanente de la nube?")) {
                db.collection("ordenes").doc(id).delete()
                .catch((error) => alert("No se pudo eliminar: " + error.message));
            }
        }

        function editarOrden(id) {
            let orden = todasLasOrdenes.find(o => o.id === id);
            if (orden) {
                document.getElementById("cliente").value = orden.cliente;
                document.getElementById("producto").value = orden.producto;
                document.getElementById("cantidad").value = orden.cantidad;
                document.getElementById("fecha").value = orden.fecha;
                
                idEditando = id;
                document.getElementById("btnFormulario").innerText = "💾 Guardar Cambios Realizados";
                document.getElementById("tituloFormulario").innerText = "✏️ Editando Orden de Trabajo";
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // --- FUNCIÓN NUEVA: CLONACIÓN / REPETIR ORDEN ---
        function clonarOrden(id) {
            let orden = todasLasOrdenes.find(o => o.id === id);
            if (orden) {
                // Copia los datos principales al formulario
                document.getElementById("cliente").value = orden.cliente;
                document.getElementById("producto").value = orden.producto;
                document.getElementById("cantidad").value = orden.cantidad;
                
                // IMPORTANTE: Dejamos la fecha vacía para obligar a elegir el nuevo plazo
                document.getElementById("fecha").value = "";
                
                // Nos aseguramos de que actúe como una NUEVA orden y no como edición
                idEditando = null;
                document.getElementById("btnFormulario").innerText = "Crear Orden de Trabajo";
                document.getElementById("tituloFormulario").innerText = "Nueva Orden de Producción (Clonada 🔄)";
                
                // Scroll suave hacia el formulario arriba
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function mostrarTablas() {
            let tablaActivasHTML = document.getElementById("tablaDeOrdenes");
            let tablaHistorialHTML = document.getElementById("tablaHistorial");
            
            tablaActivasHTML.innerHTML = "";
            tablaHistorialHTML.innerHTML = "";

            let terminoBusqueda = document.getElementById("buscadorCliente").value.toLowerCase();

            let ordenesFiltradas = todasLasOrdenes.filter(orden => 
                orden.cliente && orden.cliente.toLowerCase().includes(terminoBusqueda)
            );

            let tieneActivas = false;
            let tieneHistorial = false;

            const hoy = new Date();
            hoy.setHours(0,0,0,0);

            ordenesFiltradas.forEach((orden) => {
                // ESTILOS DE LOS BOTONES DE ACCIÓN
                let estiloBtnEliminar = `background-color: transparent; border-color: #d93526; color: #d93526; width: auto; margin: 0; padding: 2px 8px; display: inline-block;`;
                let estiloBtnEditar = `background-color: transparent; border-color: #ffa600; color: #ffa600; width: auto; margin: 0; padding: 2px 8px; display: inline-block; margin-right: 5px;`;
                let estiloBtnClonar = `background-color: transparent; border-color: #268bd2; color: #268bd2; width: auto; margin: 0; padding: 2px 8px; display: inline-block; margin-right: 5px;`;

                if (orden.estado === "Pendiente" || orden.estado === "En proceso") {
                    tieneActivas = true;
                    
                    let celdaAlertaFecha = "";
                    if (orden.fecha) {
                        const fechaEntrega = new Date(orden.fecha + 'T00:00:00');
                        const difTiempo = fechaEntrega - hoy;
                        const difDias = Math.floor(difTiempo / (1000 * 60 * 60 * 24));

                        if (difDias < 0) {
                            celdaAlertaFecha = `<span class="badge-fecha" style="background-color: #721c24; color: #f8d7da;">🔴 Atrasado (${Math.abs(difDias)}d)</span>`;
                        } else if (difDias === 0) {
                            celdaAlertaFecha = `<span class="badge-fecha alerta-hoy">🚨 ENTREGA HOY</span>`;
                        } else if (difDias <= 3) {
                            celdaAlertaFecha = `<span class="badge-fecha" style="background-color: #b58900; color: white;">🟡 Quedan ${difDias}d</span>`;
                        } else {
                            celdaAlertaFecha = `<span class="badge-fecha" style="background-color: #2aa198; color: white;">🟢 Faltan ${difDias}d</span>`;
                        }
                    } else {
                        celdaAlertaFecha = `<span style="color: gray;">Sin fecha</span>`;
                    }

                    let etiquetaEstado = orden.estado === "Pendiente" ? `<span style="color: #b58900;">🟡 Pendiente</span>` : `<span style="color: #268bd2; font-weight: bold;">🔵 En proceso</span>`;
                    let botonFlujo = orden.estado === "Pendiente" ? 
                        `<button class="outline" style="width: auto; margin: 0; padding: 2px 10px; display: inline-block; margin-right: 5px;" onclick="cambiarEstado('${orden.id}', 'En proceso')">▶ Iniciar</button>` : 
                        `<button class="outline contrast" style="width: auto; margin: 0; padding: 2px 10px; display: inline-block; margin-right: 5px;" onclick="cambiarEstado('${orden.id}', 'Terminado')">✓ Terminar</button>`;

                    tablaActivasHTML.innerHTML += `
                        <tr>
                            <td><strong>${orden.cliente}</strong></td>
                            <td>${orden.producto}</td>
                            <td><mark>${orden.cantidad} uds</mark></td>
                            <td>
                                ${celdaAlertaFecha}
                                <br><small style="color: gray; font-size: 0.75rem;">Prog: ${orden.fecha}</small>
                            </td>
                            <td>${etiquetaEstado}</td>
                            <td>
                                <div style="display: flex; align-items: center;">
                                    ${botonFlujo}
                                    <button class="outline" style="${estiloBtnClonar}" onclick="clonarOrden('${orden.id}')" title="Clonar Trabajo">🔄</button>
                                    <button class="outline" style="${estiloBtnEditar}" onclick="editarOrden('${orden.id}')" title="Editar">✏️</button>
                                    <button class="outline" style="${estiloBtnEliminar}" onclick="eliminarOrden('${orden.id}')" title="Eliminar">🗑️</button>
                                </div>
                            </td>
                        </tr>
                    `;
                } else if (orden.estado === "Terminado") {
                    tieneHistorial = true;
                    tablaHistorialHTML.innerHTML = `
                        <tr>
                            <td><del>${orden.cliente}</del></td>
                            <td>${orden.producto}</td>
                            <td>${orden.cantidad} uds</td>
                            <td>${orden.fecha}</td>
                            <td><span style="color: #2aa198;">🟢 Entregado</span></td>
                            <td>
                                <div style="display: flex; align-items: center;">
                                    <button class="outline" style="${estiloBtnClonar}" onclick="clonarOrden('${orden.id}')" title="Repetir este Trabajo">🔄</button>
                                    <button class="outline" style="${estiloBtnEliminar}" onclick="eliminarOrden('${orden.id}')" title="Eliminar del historial">🗑️</button>
                                </div>
                            </td>
                        </tr>
                    ` + tablaHistorialHTML.innerHTML;
                }
            });

            if (!tieneActivas) {
                tablaActivasHTML.innerHTML = `<tr><td colspan="6" style="text-align: center; color: gray;">No hay órdenes activas.</td></tr>`;
            }
            if (!tieneHistorial) {
                tablaHistorialHTML.innerHTML = `<tr><td colspan="6" style="text-align: center; color: gray;">No hay trabajos en el historial.</td></tr>`;
            }
        }
    </script>
</body>
</html>
